<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Reset CSS -->
    <link rel="stylesheet" href="./assets/css/reset.css" />

    <!-- Styles CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css" />

    <!-- Link Font Sen, Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sen:wght@700&display=swap"
      rel="stylesheet"
    />
    <title>Project 2</title>
  </head>
  <body>
    <main style="height: 5000px">
      <!-- Header -->
      <header class="header fixed">
        <div class="content">
          <div class="body">
            <!-- Logo -->
            <img src="./assets/img/Lesson..svg" alt="Lesson." class="logo" />

            <!-- Nav -->
            <nav class="nav">
              <ul>
                <li class="active"><a href="#!">Home</a></li>
                <li><a href="#!">Courses</a></li>
                <li><a href="#!">Pricing</a></li>
                <li><a href="#!">Reviews</a></li>
              </ul>
            </nav>

            <!-- Button -->
            <div class="action">
              <a href="#!" class="btn sign-up-btn">Sign up</a>
            </div>
          </div>
        </div>
      </header>
      <!-- Hero -->
      <div class="hero">
        <div class="content">
          <div class="body">
            <!-- Hero left -->
            <div class="media-block">
              <img
                src="./assets/img/hero.jpg"
                alt="Learn without limits and spread knowledge."
                class="img"
              />

              <!-- Summary -->
              <div class="hero-summary">
                <!-- Page -->
                <div class="item">
                  <div class="icon">
                    <img src="./assets/icon/page.svg" alt="" />
                  </div>
                  <div class="info">
                    <p class="label">20 Courses</p>
                    <p class="title">UI/UX Design</p>
                  </div>
                </div>
                <!-- Code-window -->
                <div class="item">
                  <div class="icon">
                    <img src="./assets/icon/code.svg" alt="" />
                  </div>
                  <div class="info">
                    <p class="label">20 Courses</p>
                    <p class="title">Development</p>
                  </div>
                </div>
                <!-- Megaphone -->
                <div class="item">
                  <div class="icon">
                    <img src="./assets/icon/megaphone.svg" alt="" />
                  </div>
                  <div class="info">
                    <p class="label">30 Courses</p>
                    <p class="title">Marketing</p>
                  </div>
                </div>
              </div>
            </div>

            <!-- Hero right -->
            <div class="content-block"></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
